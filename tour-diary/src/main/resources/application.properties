spring.application.name=tour-diary
spring.config.import=optional:file:./.env[.properties],optional:file:./tour-diary/.env[.properties]
app.demo.seed=${APP_DEMO_SEED:false}

spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/tour-diary}
spring.mongodb.database=${MONGODB_DATABASE:tour-diary}
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/tour-diary}
spring.data.mongodb.database=${MONGODB_DATABASE:tour-diary}

app.ai.gemini-api-key=${GEMINI_API_KEY:}
app.ai.gemini-model=${GEMINI_MODEL:gemini-2.5-flash}
app.ai.groq-api-key=${GROQ_API_KEY:}
app.ai.groq-model=${GROQ_MODEL:llama-3.1-8b-instant}
app.ai.cloudflare-account-id=${CLOUDFLARE_ACCOUNT_ID:}
app.ai.cloudflare-api-token=${CLOUDFLARE_API_TOKEN:}
app.ai.cloudflare-image-model=${CLOUDFLARE_IMAGE_MODEL:@cf/black-forest-labs/flux-1-schnell}
app.ai.huggingface-token=${HUGGINGFACE_TOKEN:}
app.ai.image-generate-url=${AI_IMAGE_GENERATE_URL:}

app.kakao.rest-api-key=${KAKAO_REST_API_KEY:}
app.kto.tour-api-key=${KTO_TOUR_API_KEY:}
app.kto.base-url=${KTO_TOUR_API_BASE_URL:https://apis.data.go.kr/B551011/KorService2}
app.kto.pet-tour-api-key=${KTO_PET_TOUR_API_KEY:}
app.kto.pet-tour-base-url=${KTO_PET_TOUR_API_BASE_URL:https://apis.data.go.kr/B551011/KorPetTourService2}
app.kto.durunubi-api-key=${KTO_DURUNUBI_API_KEY:}
app.kto.accessible-tour-api-key=${KTO_ACCESSIBLE_TOUR_API_KEY:}
app.kto.green-tour-api-key=${KTO_GREEN_TOUR_API_KEY:}
